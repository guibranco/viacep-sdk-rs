name: Clippy check

on:
  workflow_dispatch:
  pull_request:

jobs:
  clippy-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Rust
        run: rustup toolchain install stable --component clippy

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings
